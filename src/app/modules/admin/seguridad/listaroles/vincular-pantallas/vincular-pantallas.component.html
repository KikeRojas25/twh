<p-toast></p-toast>

<div class="bg-white">
  <!-- Encabezado -->
  <div class="px-1 pb-3 border-b border-gray-200">
    <h3 class="text-base font-semibold text-gray-900 m-0">Lista de Opciones del WMS</h3>
    <p class="text-xs text-gray-500 mt-0.5 m-0">
      Opciones del menú del sistema
      <span *ngIf="rolDescripcion" class="ml-1 text-gray-700">— Rol: <strong>{{ rolDescripcion }}</strong></span>
    </p>
  </div>

  <!-- Contenido en dos columnas -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 p-3">

    <!-- Columna izquierda: árbol -->
    <div class="flex flex-col">
      <input
        pInputText
        type="text"
        class="w-full text-sm mb-2"
        placeholder="Filter"
        [(ngModel)]="filtro"
        (input)="aplicarFiltro()" />

      <div class="flex items-center gap-2 mb-2">
        <p-checkbox
          [binary]="true"
          [ngModel]="allChecked"
          (onChange)="toggleAll($event.checked)"
          inputId="chkAll">
        </p-checkbox>
        <label for="chkAll" class="text-sm text-gray-700 cursor-pointer select-none">All</label>
      </div>

      <div class="border border-gray-200 rounded-md overflow-hidden">
        <p-tree
          [value]="filtered"
          [loading]="cargando"
          selectionMode="checkbox"
          [(selection)]="selectedNodes"
          [filter]="false"
          styleClass="rol-paginas-tree"
          [style]="{ 'max-height': '380px', 'overflow': 'auto' }">
          <ng-template let-node pTemplate="default">
            <span class="text-sm text-gray-700">{{ node.label }}</span>
          </ng-template>
        </p-tree>
      </div>
    </div>

    <!-- Columna derecha: preview de selección -->
    <div class="flex flex-col">
      <div class="bg-green-50 border border-green-200 rounded-md p-3 mb-2">
        <h4 class="text-sm font-semibold text-green-900 m-0">Menu Seleccionado:</h4>
        <p class="text-xs text-green-700 mt-0.5 m-0">{{ seleccionLabels.length }} opciones</p>
      </div>

      <div class="flex-1 border border-gray-200 rounded-md overflow-auto" style="max-height: 380px;">
        <ul *ngIf="seleccionLabels.length > 0" class="m-0 p-0 list-none">
          <li *ngFor="let label of seleccionLabels"
              class="px-3 py-1.5 border-b border-gray-100 text-sm text-gray-700 hover:bg-gray-50">
            <i class="pi pi-check text-green-600 mr-2 text-xs"></i>{{ label }}
          </li>
        </ul>
        <div *ngIf="seleccionLabels.length === 0" class="p-6 text-center text-gray-400 text-sm">
          <i class="pi pi-inbox text-3xl mb-2 block"></i>
          Sin selección
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="flex justify-end gap-2 px-3 py-3 border-t border-gray-200 bg-gray-50">
    <button pButton type="button" label="Cancelar" icon="pi pi-times"
            class="p-button-text" (click)="cancelar()"></button>
    <button pButton type="button" label="Guardar vínculos" icon="pi pi-save"
            class="bg-green-600 hover:bg-green-700 border-green-600"
            [loading]="guardando" (click)="guardar()"></button>
  </div>
</div>
