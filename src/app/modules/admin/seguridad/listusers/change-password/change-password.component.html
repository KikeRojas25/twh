<form [formGroup]="form" class="p-4 flex flex-col gap-4">

  <div class="flex items-center gap-2 p-3 bg-amber-50 border border-amber-200 rounded-lg text-amber-800 text-sm">
    <i class="pi pi-key text-amber-600"></i>
    Cambiando contraseña de: <strong>{{ nombreUsuario }}</strong>
  </div>

  <div class="flex flex-col gap-1">
    <label class="text-xs font-medium text-gray-700">Nueva contraseña <span class="text-red-500">*</span></label>
    <input pInputText type="password" formControlName="password" placeholder="4–8 caracteres" class="w-full text-sm" />
    <small class="text-red-500" *ngIf="hasError('password','required')">La contraseña es requerida.</small>
    <small class="text-red-500" *ngIf="hasError('password','minlength')">Mínimo 4 caracteres.</small>
    <small class="text-red-500" *ngIf="hasError('password','maxlength')">Máximo 8 caracteres.</small>
  </div>

  <div class="flex flex-col gap-1">
    <label class="text-xs font-medium text-gray-700">Confirmar contraseña <span class="text-red-500">*</span></label>
    <input pInputText type="password" formControlName="confirmPassword" placeholder="Repita la contraseña" class="w-full text-sm" />
    <small class="text-red-500" *ngIf="hasError('confirmPassword','required')">Debe confirmar la contraseña.</small>
    <small class="text-red-500" *ngIf="mismatch">Las contraseñas no coinciden.</small>
  </div>

  <div class="flex justify-end gap-2 pt-2 border-t border-gray-200">
    <button pButton class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 hover:bg-gray-50 rounded-md" icon="pi pi-times" label="Cancelar" (click)="cancelar()"></button>
    <button pButton class="px-4 py-2 text-sm font-medium text-white bg-amber-600 hover:bg-amber-700 rounded-md" icon="pi pi-key" label="Cambiar contraseña" [disabled]="guardando" (click)="guardar()"></button>
  </div>

</form>
