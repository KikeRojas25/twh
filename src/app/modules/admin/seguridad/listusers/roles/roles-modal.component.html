<div class="p-4">

  <div *ngIf="cargando" class="flex justify-center p-8">
    <i class="pi pi-spin pi-spinner text-3xl text-gray-500"></i>
  </div>

  <div *ngIf="!cargando">
    <div class="flex items-center gap-2 p-3 mb-4 bg-blue-50 border border-blue-200 rounded-lg text-blue-800 text-sm">
      <i class="pi pi-shield text-blue-600"></i>
      Gestionando roles de: <strong>{{ nombreUsuario }}</strong>
    </div>

    <p-pickList
      [source]="disponibles"
      [target]="asignados"
      sourceHeader="Roles disponibles"
      targetHeader="Roles asignados"
      [dragdrop]="true"
      [responsive]="true"
      [sourceStyle]="{ height: '280px' }"
      [targetStyle]="{ height: '280px' }"
      filterBy="descripcion"
      sourceFilterPlaceholder="Buscar..."
      targetFilterPlaceholder="Buscar..."
      breakpoint="1400px">

      <ng-template let-rol pTemplate="item">
        <div class="flex items-center gap-2 py-1">
          <i class="pi pi-shield text-blue-500 text-xs"></i>
          <span class="text-sm text-gray-800">{{ rol.descripcion }}</span>
          <span class="ml-auto text-xs text-gray-400 italic">{{ rol.alias }}</span>
        </div>
      </ng-template>

    </p-pickList>

    <div class="flex justify-end gap-2 pt-4 mt-2 border-t border-gray-200">
      <button pButton class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 hover:bg-gray-50 rounded-md" icon="pi pi-times" label="Cancelar" (click)="cancelar()"></button>
      <button pButton class="px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-md" icon="pi pi-check" label="Guardar roles" [disabled]="guardando" (click)="guardar()"></button>
    </div>
  </div>

</div>
