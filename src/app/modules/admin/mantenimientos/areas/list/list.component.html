<div class="flex flex-col flex-auto min-w-0">
  <!-- Encabezado -->
  <div class="flex flex-col sm:flex-row flex-0 sm:items-center sm:justify-between p-6 sm:py-8 sm:px-10 border-b bg-card dark:bg-transparent">
    <div class="flex-1 min-w-0">
      <div class="flex flex-wrap items-center font-medium">
        <a class="whitespace-nowrap text-primary-500">TWH</a>
        <div class="flex items-center ml-1 whitespace-nowrap">
          <mat-icon class="fuse-horizontal-navigation-item-icon" [svgIcon]="'heroicons_solid:chevron-right'"></mat-icon>
          <a class="ml-1 text-primary-500">Mantenimiento</a>
        </div>
      </div>
      <div class="mt-2">
        <h2 class="text-3xl md:text-4xl font-extrabold tracking-tight leading-7 sm:leading-10 truncate">Áreas</h2>
      </div>
    </div>
  </div>

  <div class="flex flex-col flex-auto min-w-0 space-y-6 p-6 sm:px-10">
    <!-- Filtros -->
    <div class="bg-white dark:bg-gray-800 shadow-sm rounded-lg p-6 border">
      <div class="grid grid-cols-1 sm:grid-cols-4 gap-6">

        <div class="flex flex-col">
          <label class="font-bold text-gray-700 dark:text-gray-300 mb-2">ALMACÉN:</label>
          <p-dropdown
            [options]="almacenes"
            [(ngModel)]="model.almacenId"
            placeholder="Todos los almacenes"
            [showClear]="true"
            [filter]="true"
            class="w-full">
          </p-dropdown>
        </div>

        <div class="flex items-end">
          <p-button icon="pi pi-search" label="Buscar" (click)="buscar()" class="w-full"
            severity="success" [loading]="cargando"></p-button>
        </div>

        <div class="flex items-end">
          <p-button icon="pi pi-plus" label="Nueva Área" (click)="nuevo()" class="w-full"
            severity="primary"></p-button>
        </div>

      </div>
    </div>

    <!-- Tabla -->
    <div class="bg-white dark:bg-gray-800 shadow-sm rounded-lg p-6 border">
      <p-table
        class="w-full"
        [value]="areas"
        [paginator]="true"
        [rows]="15"
        [resizableColumns]="true"
        responsiveLayout="scroll"
        [scrollable]="true"
        [loading]="cargando">

        <ng-template pTemplate="header">
          <tr class="bg-gray-50">
            <th class="text-center" style="width:120px">ACCIONES</th>
            <th class="text-left">NOMBRE</th>
            <th class="text-center">TIPO ÁREA</th>
            <th class="text-center">ALMACÉN ID</th>
          </tr>
        </ng-template>

        <ng-template pTemplate="body" let-area>
          <tr>
            <td class="text-center space-x-2">
              <p-button severity="success" icon="fa fa-edit" pTooltip="Editar" (click)="editar(area)"></p-button>
              <p-button severity="danger" icon="pi pi-trash" pTooltip="Eliminar" (click)="eliminar(area.id)"></p-button>
            </td>
            <td class="text-left">{{ area.nombre || '-' }}</td>
            <td class="text-center">{{ area.tipoAreaId || '-' }}</td>
            <td class="text-center">{{ area.almacenId || '-' }}</td>
          </tr>
        </ng-template>

        <ng-template pTemplate="emptymessage">
          <tr>
            <td colspan="4" class="text-center p-4">No se encontraron áreas. Seleccione un almacén y haga clic en Buscar.</td>
          </tr>
        </ng-template>

      </p-table>
    </div>
  </div>
</div>

<p-confirmDialog />
<p-toast />
