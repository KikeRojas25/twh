<div class="pt-1">

  <!-- ═══════════ Nueva actividad ═══════════ -->
  <div class="bg-white border border-gray-200 rounded-xl shadow-sm px-6 pt-5 pb-6 mb-8">
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-5">
      <div class="flex flex-col gap-2 sm:col-span-2">
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Título</label>
        <input pInputText [(ngModel)]="form.titulo" placeholder="Ej: Llamar para agendar visita" class="w-full" />
      </div>
      <div class="flex flex-col gap-2">
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Tipo</label>
        <p-dropdown [options]="tipoOpciones" [(ngModel)]="form.tipo"
          optionLabel="label" optionValue="value" styleClass="w-full"></p-dropdown>
      </div>
      <div class="flex flex-col gap-2">
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Vence</label>
        <p-calendar [(ngModel)]="form.fechaVencimiento" [showTime]="true" dateFormat="dd/mm/yy" [showIcon]="true"
          appendTo="body" styleClass="w-full" inputStyleClass="w-full"></p-calendar>
      </div>
      <div class="flex flex-col gap-2">
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Responsable</label>
        <p-dropdown [options]="vendedores" [(ngModel)]="form.responsableUsuarioId"
          optionLabel="nombre" optionValue="id" placeholder="Sin asignar"
          [filter]="true" filterBy="nombre" [showClear]="true" styleClass="w-full"></p-dropdown>
      </div>
      <div class="flex flex-col gap-2" *ngIf="!modoOportunidad && oportunidades.length > 0">
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Oportunidad</label>
        <p-dropdown [options]="oportunidades" [(ngModel)]="form.oportunidadId"
          optionLabel="label" optionValue="value" [showClear]="true"
          placeholder="Sin oportunidad" styleClass="w-full"></p-dropdown>
      </div>
    </div>

    <div class="flex justify-end mt-5">
      <p-button label="Agregar actividad" [icon]="guardando ? 'pi pi-spin pi-spinner' : 'pi pi-plus'"
        [disabled]="guardando" (click)="registrar()" styleClass="px-6 py-2.5"></p-button>
    </div>
  </div>

  <!-- ═══════════ Estado vacío ═══════════ -->
  <div *ngIf="actividades.length === 0 && !cargando" class="flex flex-col items-center text-center gap-3 py-12">
    <span class="flex w-16 h-16 items-center justify-center rounded-full bg-gray-100 text-gray-300">
      <i class="pi pi-check-square text-3xl"></i>
    </span>
    <div>
      <p class="text-sm font-medium text-gray-500">Sin actividades pendientes</p>
      <p class="text-xs text-gray-400 mt-1">Agenda una tarea o recordatorio arriba.</p>
    </div>
  </div>

  <!-- ═══════════ Lista ═══════════ -->
  <div *ngIf="actividades.length > 0" class="flex flex-col gap-2.5">
    <div *ngFor="let a of actividades"
      class="group flex items-start gap-3 bg-white border border-gray-200 rounded-xl shadow-sm p-4 hover:shadow-md transition-shadow"
      [class.opacity-60]="a.estado === 'COMPLETADA'">

      <!-- Check completar -->
      <i class="cursor-pointer text-xl mt-0.5"
        [ngClass]="a.estado === 'COMPLETADA' ? 'pi pi-check-circle text-green-500' : 'pi pi-circle text-gray-300 hover:text-indigo-500'"
        [pTooltip]="a.estado === 'COMPLETADA' ? 'Reabrir' : 'Completar'" (click)="toggleCompletar(a)"></i>

      <div class="flex-auto min-w-0">
        <div class="flex items-start justify-between gap-2">
          <span class="text-sm font-semibold text-gray-800" [class.line-through]="a.estado === 'COMPLETADA'">{{ a.titulo }}</span>
          <i class="pi pi-trash text-gray-300 hover:text-red-500 cursor-pointer text-xs opacity-0 group-hover:opacity-100 transition-opacity"
             pTooltip="Eliminar" (click)="eliminar(a)"></i>
        </div>
        <div class="flex items-center gap-3 mt-2 text-xs flex-wrap">
          <span class="inline-flex items-center gap-1 text-gray-500"><i [class]="iconoTipo(a.tipo)"></i>{{ a.tipo | titlecase }}</span>
          <p-tag [value]="a.estado | titlecase" [severity]="estadoSeverity(a.estado)"></p-tag>
          <span class="inline-flex items-center gap-1" [ngClass]="a.vencida ? 'text-red-500 font-semibold' : 'text-gray-400'">
            <i class="pi pi-clock"></i>{{ a.fechaVencimiento | date:'dd MMM, HH:mm' }}
          </span>
          <span *ngIf="a.responsableNombre" class="inline-flex items-center gap-1 text-gray-400"><i class="pi pi-user"></i>{{ a.responsableNombre }}</span>
          <span *ngIf="!modoOportunidad && a.oportunidadNombre" class="text-indigo-600 bg-indigo-50 rounded-full px-2 py-0.5"><i class="pi pi-flag mr-1"></i>{{ a.oportunidadNombre }}</span>
        </div>
      </div>
    </div>
  </div>
</div>

<p-confirmDialog>
  <ng-template pTemplate="message" let-message>
    <div class="flex flex-col items-center gap-3 p-2">
      <i class="pi pi-exclamation-triangle text-4xl text-orange-500"></i>
      <p class="text-sm text-center" [innerHTML]="message.message"></p>
    </div>
  </ng-template>
</p-confirmDialog>
<p-toast />
