<div class="flex flex-col flex-auto min-w-0 bg-gray-50">
    <!-- Encabezado -->
    <div class="flex flex-col sm:flex-row flex-0 sm:items-center sm:justify-between p-6 sm:py-4 sm:px-10 border-b border-gray-200 bg-white shadow-sm">
        <div class="flex-1 min-w-0">
        <div class="flex flex-wrap items-center font-medium text-sm text-gray-600">
            <div>
            <a  class="whitespace-nowrap text-gray-700 hover:text-gray-900">TWH</a>
            </div>
            <div class="flex items-center ml-1 whitespace-nowrap">
                <mat-icon class="fuse-horizontal-navigation-item-icon text-gray-400" [svgIcon]="'heroicons_solid:chevron-right'"></mat-icon>
                <a  class="ml-1 text-gray-700 hover:text-gray-900">Ajustes de Inventario</a>
            </div>
        </div>
            <div class="mt-1"><h2 class="text-3xl md:text-4xl font-semibold tracking-tight leading-7 sm:leading-10 truncate text-gray-900">Nueva solicitud de Ajuste</h2>
        </div>
    </div>
    </div>

    <!-- Filtro de búsqueda -->
<div class="flex flex-wrap sm:flex-nowrap gap-3 px-6 py-3 sm:px-10 border-b bg-card dark:bg-transparent items-end">

  <!-- Propietario -->
  <div class="w-full sm:w-[300px]">
    <label class="block text-xs font-medium text-gray-700 dark:text-gray-200 mb-1">Propietario</label>
    <p-dropdown
      [options]="clientes"
      [(ngModel)]="model.PropietarioId"
      scrollHeight="40vh"
      class="w-full text-sm"
      [style]="{ height: '40px', width: '100%' }"
      placeholder="Todos"
      filter="true"
      (onChange)="CambioCliente($event)">
      <ng-template let-item pTemplate="selectedItem">
        <span>{{item.label}}</span>
      </ng-template>
    </p-dropdown>
  </div>

  <!-- Producto -->
  <div class="w-full sm:w-[300px]">
    <label class="block text-xs font-medium text-gray-700 dark:text-gray-200 mb-1">Producto</label>
    <p-dropdown
      [options]="productos"
      [(ngModel)]="model.ProductoId"
      scrollHeight="40vh"
      class="w-full text-sm"
      [style]="{ height: '40px', width: '100%' }"
      placeholder="Todos"
      filter="true">
      <ng-template let-item pTemplate="selectedItem">
        <span>{{item.label}}</span>
      </ng-template>
    </p-dropdown>
  </div>

  <!-- LPN -->
  <div class="w-full sm:w-[300px]">
    <label class="block text-xs font-medium text-gray-700 dark:text-gray-200 mb-1">LPN</label>
    <input
      pInputText
      maxlength="50"
      class="w-full h-[40px] text-sm"
      autocomplete="off"
      [(ngModel)]="model.lpn"
      type="text"
      placeholder="Ingrese ubicación"
      name="lpn"
      #lpn="ngModel">
  </div>

  <!-- Botón Buscar -->
  <div class="w-full sm:w-[160px] flex items-end">
    <button
      class="w-full h-[40px] px-4 py-2 inline-flex items-center justify-center text-sm font-medium text-white bg-gray-700 hover:bg-gray-600 rounded-md shadow-sm transition-all duration-150"
      pButton
      icon="fa fa-search"
      label="Buscar"
      iconPos="left"
      (click)="buscar()">
    </button>
  </div>
</div>

  <div class="flex flex-col px-6 py-2 sm:px-10 border-b bg-card dark:bg-transparent">
        <div class="flex flex-wrap gap-2">
            <p-splitButton
                label="Acciones"
                icon="pi pi-cog"
                [model]="items"
                pTooltip="Operaciones sobre los items seleccionados"
                tooltipPosition="top"
                styleClass="ajuste-split-btn"></p-splitButton>
            <button
                class="px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-md shadow-sm transition-all duration-150"
                pButton
                icon="fa fa-edit"
                label="Modificar selección"
                iconPos="left"
                pTooltip="Aplica cambios masivos a los items marcados"
                tooltipPosition="top"
                (click)="actualizar_masivo()">
            </button>
        </div>
     </div>

    <!-- Tabla Inventario -->
    <div class="flex flex-col px-6 py-3 sm:px-10 border-b bg-card dark:bg-transparent">

        

        <p-table 
            [style]="{width:'100%'}"
            [scrollable]="true" 
            [columns]="cols" 
            [value]="listData"
            #dt [paginator]="true"
            [rows]="10" 
            [resizableColumns]="true" 
            selectionMode="multiple" 
            dataKey="id"
            [selectionPageOnly]="true"
            [responsive]="true"
            [(selection)]="seleccion"
            >

            <ng-template pTemplate="colgroup" let-columns>
                <colgroup>
                    <col [ngStyle]="{'width': '50px'}">
                    <col *ngFor="let col of columns"   [ngStyle]="{'width': col.width}" >
                </colgroup>
            </ng-template>

            <ng-template pTemplate="header" let-columns>
                <tr>
                    <th [ngStyle]="{'width': '50px'}" class="text-center">
                        <p-tableHeaderCheckbox></p-tableHeaderCheckbox>
                    </th>
                    <th  [ngStyle]="{'width': col.width}" *ngFor="let col of columns" pResizableColumn [pSortableColumn]="col.field">
                        {{col.header}}
                        <p-sortIcon [field]="col.field" ariaLabel="Activate to sort" ariaLabelDesc="Activate to sort in descending order" ariaLabelAsc="Activate to sort in ascending order"></p-sortIcon>
                    </th>
                </tr>
            </ng-template>

            <ng-template pTemplate="body" let-rowData let-columns="columns">
                <tr  [pSelectableRow]="rowData">
                    <td class="ui-resizable-column text-center">
                        <p-tableCheckbox [value]="rowData"></p-tableCheckbox>
                    </td>
                    <td class="text-center px-4 py-2">
                        <div class="flex flex-wrap justify-center gap-1">
                            <p-button
                                severity="primary"
                                icon="pi pi-pencil"
                                [size]="small"
                                [raised]="true"
                                pTooltip="Editar inventario"
                                tooltipPosition="top"
                                (click)="edit(rowData.id)"></p-button>
                            <p-button
                                severity="secondary"
                                icon="pi pi-sliders-h"
                                [size]="small"
                                [raised]="true"
                                pTooltip="Ajustar stock"
                                tooltipPosition="top"
                                (click)="editstock(rowData.id)"></p-button>
                        </div>
                    </td>
                      <td class="ui-resizable-column text-center"> {{rowData.id  }}</td>                        
                    <td class="ui-resizable-column text-center"> {{rowData.ubicacion  }}</td>
                    <td class="ui-resizable-column text-center" > {{rowData.lodNum  }}</td>
                    <td class="ui-resizable-column text-center"> {{rowData.descripcionLarga  }} </td>
                    <td class="ui-resizable-column text-center"> {{rowData.lotNum}} </td>
                    <td class="ui-resizable-column text-center"> {{rowData.untQty}} </td>
                    <td class="ui-resizable-column text-center"> {{rowData.estado}} </td>
                    
                </tr>
            </ng-template>
        </p-table>

    </div>
</div>
<p-toast></p-toast>
