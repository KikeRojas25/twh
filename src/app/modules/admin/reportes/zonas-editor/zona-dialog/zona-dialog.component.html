<p-toast></p-toast>

<div class="flex flex-col gap-4 pt-1">

  <!-- Código + Nombre -->
  <div class="grid grid-cols-3 gap-3">
    <div class="flex flex-col gap-1.5 col-span-1">
      <label class="text-xs font-semibold text-gray-600">Código <span class="text-red-500">*</span></label>
      <input pInputText [(ngModel)]="model.codigo" placeholder="Ej. ZREF" maxlength="20"
        class="w-full uppercase" />
    </div>
    <div class="flex flex-col gap-1.5 col-span-2">
      <label class="text-xs font-semibold text-gray-600">Nombre <span class="text-red-500">*</span></label>
      <input pInputText [(ngModel)]="model.nombre" placeholder="Ej. Zona refrigerados" maxlength="100" class="w-full" />
    </div>
  </div>

  <!-- Color -->
  <div class="flex flex-col gap-2">
    <label class="text-xs font-semibold text-gray-600">Color</label>
    <div class="flex items-center gap-3">
      <p-colorPicker [(ngModel)]="colorRaw" format="hex" appendTo="body"></p-colorPicker>
      <span class="inline-flex items-center gap-2 rounded-md ring-1 ring-gray-200 px-2 py-1">
        <span class="h-5 w-5 rounded ring-1 ring-black/10" [style.background]="'#' + colorRaw"></span>
        <span class="font-mono text-xs text-gray-700 uppercase">#{{ colorRaw }}</span>
      </span>
    </div>
    <!-- Paleta sugerida -->
    <div class="flex flex-wrap gap-1.5 mt-1">
      <button *ngFor="let c of paleta" type="button" (click)="elegirPaleta(c)"
        class="h-6 w-6 rounded-md ring-1 ring-black/10 transition-transform hover:scale-110"
        [class.ring-2]="colorRaw === c" [class.ring-indigo-500]="colorRaw === c"
        [style.background]="'#' + c" [title]="'#' + c"></button>
    </div>
  </div>

  <!-- Acciones -->
  <div class="flex justify-end gap-2 pt-2 border-t border-gray-100">
    <button pButton type="button" label="Cancelar" class="p-button-text p-button-secondary" (click)="cerrar()"></button>
    <button pButton type="button" [label]="esEdicion ? 'Guardar cambios' : 'Crear zona'"
      icon="pi pi-check" (click)="guardar()" [disabled]="guardando" [loading]="guardando"></button>
  </div>
</div>
